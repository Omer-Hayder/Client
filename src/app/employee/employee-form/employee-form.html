<div class="card">
    <div class="card-header">Create Employee</div>
    <div class="card-body">
        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Employee Name</label>
                <input type="text" [(ngModel)]="employee.name" name="name" class="form-control" id="name"
                    placeholder="Ahmed">
            </div>
            <div class="mb-3">
                <label for="departmentId" class="form-label">Department Id</label>
                <input type="number" [(ngModel)]="employee.departmentId" name="departmentId" class="form-control"
                    id="email" placeholder="0">
            </div>
            <div class="mb-3">
                <label for="salary" class="form-label">Employee Salary</label>
                <input type="number" [(ngModel)]="employee.salary" name="salary" class="form-control" id="salary" />
            </div>
            <div class="mb-3">
                <button type="button" (click)="save()" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
{{employee | json}}
