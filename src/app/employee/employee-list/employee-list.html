<table class="table">
    <thead>
        <tr>
            <th scope="col">Name</th>
            <th scope="col">Salary</th>
            <th scope="col">Department</th>
        </tr>
    </thead>
    <tbody>
        @for (employee of employeeList; track employee.id) {
        <tr>
            <td>{{employee.name}}</td>
            <td>{{employee.salary}}</td>
            <td>{{employee.departmentName}}</td>
        </tr>
        }
    </tbody>
</table>
