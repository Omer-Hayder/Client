@if(isLoading()){
<div class="d-flex align-items-center">
    <strong role="status">Loading...</strong>
    <div class="spinner-border ms-auto" aria-hidden="true"></div>
</div>
}@else {
<div class="row mb-5">
    <div class="col-10">
        <h3>Employee List</h3>
    </div>
    <div class="col-2"><button class="btn btn-primary" (click)="openModal(employeeModal)">Create</button></div>
</div>
<div class="card">
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Salary</th>
                    <th scope="col">Department</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                @for (employee of employeeList(); track employee.id) {
                <tr>
                    <td>{{employee.name}}</td>
                    <td>{{employee.salary}}</td>
                    <td>{{employee.departmentName}}</td>
                    <td><button [routerLink]="['/employee-details', employee.id]"
                            class="btn btn-primary">Details</button>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
}

<ng-template #employeeModal>
    <div class="modal-header">
        <h4 class="modal-title pull-left" id="my-modal-title">Create Employee</h4>
        <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="modalRef?.hide()">
            <span aria-hidden="true" class="visually-hidden">&times;</span>
        </button>
    </div>
    <div class="modal-body modal-lg text-center">
        <app-employee-form (event)="closeModal($event)"></app-employee-form>
    </div>
</ng-template>
