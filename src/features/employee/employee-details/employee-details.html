<div class="row">
    <div class="col"><button class="btn btn-light" [routerLink]="['/employee-list']">Back</button></div>
</div>
<div class="card">
    <div class="card-body">
        <div class="card-title">Employee Deatils</div>
        <div class="row">
            <div class="col">
                <th>Employee Name: </th>
                <td>{{employeeDetails()?.name}}</td>
            </div>
        </div>
        <div class="col">
            <th>Salary : </th>
            <td>{{employeeDetails()?.salary}}</td>
        </div>
        <div class="col">
            <th>HoursWorked: </th>
            <td>{{employeeDetails()?.hoursWorked}}</td>
        </div>
        <div class="col">
            <th>HourlyPay: </th>
            <td>{{employeeDetails()?.hourlyPay}}</td>
        </div>
    </div>
</div>
