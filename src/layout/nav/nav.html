<div
    class="navbar navbar-expand-lg bg-body-tertiary d-flex flex-wrap align-items-center bg-info justify-content-center justify-content-lg-start">
    <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
        <svg class="bi me-2" width="40" height="32" role="img" aria-label="Bootstrap">
            <use xlink:href="#bootstrap"></use>
        </svg>
    </a>
    <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
        <li class="nav-item"><a [routerLink]="'/'" class="nav-link px-2 text-secondary">Home</a></li>
        @if(loginService.isAuthenticated()){
        <li class="nav-item"><a [routerLink]="'/employee-list'" class="nav-link px-2">Employees</a></li>
        }
    </ul>
    @if(!loginService.isAuthenticated()){
    <form id="loginForm" class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" formControlName="username" class="form-control" placeholder="username" id="username"
                    [ngClass]="{'is-invalid': lf.username.invalid && (lf.username.dirty || lf.username.touched)}">
            </div>
            <div class="col-md-6">
                <input type="password" formControlName="password" class="form-control" placeholder="password"
                    id="password"
                    [ngClass]="{'is-invalid': lf.password.invalid && (lf.password.dirty || lf.password.touched)}">
            </div>
        </div>
    </form>
    <div class="text-end">
        <button type="submit" form="loginForm" class="btn btn-outline-success me-2">Login</button>
    </div>
    } @else {
    <div class="btn-group" dropdown>
        <button id="button-animated" dropdownToggle type="button" class="btn btn-link dropdown-toggle"
            aria-controls="dropdown-animated">
            <img src="images/user.png" alt="user" width="32" height="32" class="rounded-circle"> <span
                class="caret"></span>
        </button>
        <ul id="dropdown-animated" *dropdownMenu class="dropdown-menu dropdown-style" role="menu"
            aria-labelledby="button-animated">
            <li><a role="menuitem" class="dropdown-item">Settings</a></li>
            <li><a role="menuitem" class="dropdown-item">Profile</a></li>
            <li>
                <hr class="dropdown-divider">
            </li>
            <li><a role="menuitem" class="dropdown-item" (click)="signOut()">Sign out</a></li>
        </ul>
    </div>
    }
</div>
